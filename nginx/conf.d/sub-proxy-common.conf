# =============================================================================
# Общие настройки proxy для location-блоков подписок
# =============================================================================
# Подключается через include в каждом location /xui-sub*/ блоке.
# Позволяет добавлять новые серверы без дублирования конфигурации.
# =============================================================================

limit_except GET HEAD {
    deny all;
}

limit_req zone=one burst=5 nodelay;
client_max_body_size 1k;

proxy_pass http://127.0.0.1:9080;

proxy_http_version 1.1;
proxy_set_header   Host              $http_host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto https;
# Пустой Connection для keep-alive к backend (HTTP/1.1 default)
proxy_set_header   Connection        "";

proxy_connect_timeout 10s;
proxy_send_timeout    15s;
proxy_read_timeout    15s;

proxy_buffering        on;
proxy_buffer_size      16k;
proxy_buffers          4 32k;
proxy_busy_buffers_size 32k;

# ── Скрываем заголовки backend (минимизация fingerprinting) ──
proxy_hide_header Server;
proxy_hide_header X-Powered-By;

# ── Перехват ошибок backend — не показываем verbose ответы клиенту ──
proxy_intercept_errors on;
error_page 400 401 403 404 =404 /sub_error_404;
error_page 500 502 503 504 =502 /sub_error_502;

# ── Заголовки безопасности ──
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Cache-Control "no-store, no-cache, must-revalidate" always;
add_header Pragma "no-cache" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Robots-Tag "noindex, nofollow" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Content-Security-Policy "default-src 'none'" always;
