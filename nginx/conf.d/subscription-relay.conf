# =============================================================================
# Subscription Relay — Nginx HTTP config
# =============================================================================
# Проксирует запросы подписки к 3x-ui серверу и подменяет IP/домен в ответе,
# чтобы клиент получал конфиг с адресом relay-сервера.
# =============================================================================

# ── Переменные (задать через .env → setup.sh подставит) ───────────────────────
# RELAY_DOMAIN   — домен relay-сервера  (например relay.example.com)
# RELAY_IP       — внешний IP relay-сервера
# XUI_HOST       — IP или домен 3x-ui сервера
# XUI_SUB_PORT   — порт подписки на 3x-ui (по умолчанию 2096)
# SUB_PATH       — путь подписки на 3x-ui (по умолчанию /sub/)

upstream xui_backend {
    server ${XUI_HOST}:${XUI_SUB_PORT};
}

server {
    listen 80;
    server_name ${RELAY_DOMAIN};

    # Редирект HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ${RELAY_DOMAIN};

    # ── SSL ───────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${RELAY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RELAY_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Проксирование подписки ────────────────────────────────────────────
    location ${SUB_PATH} {
        proxy_pass         https://xui_backend${SUB_PATH};
        proxy_ssl_verify   off;
        proxy_set_header   Host              ${XUI_HOST};
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── Подмена адресов в теле ответа ─────────────────────────────────
        # sub_filter работает с текстовыми ответами (base64-подписки
        # декодируются клиентом, поэтому подмена идёт в raw-тексте).
        # Nginx модуль ngx_http_sub_module должен быть включён.

        # Заменяем IP/домен 3x-ui на relay
        sub_filter '${XUI_HOST}'  '${RELAY_DOMAIN}';
        sub_filter '${XUI_IP}'    '${RELAY_DOMAIN}';
        sub_filter_types *;
        sub_filter_once  off;

        # Отключаем сжатие от бэкенда чтобы sub_filter мог работать
        proxy_set_header Accept-Encoding "";
    }

    # Заглушка для остальных запросов
    location / {
        return 404;
    }
}
