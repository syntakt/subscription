# =============================================================================
# Subscription Relay — location для 3x-ui подписки
# =============================================================================
# Добавить этот блок в существующий server { listen 5443 ssl; ... }
# ПЕРЕД блоком location / { ... }
#
# Запросы:
#   GET https://11.11.11.11.sslip.io:5443/xui-sub/<token>
#
# Цепочка:
#   Клиент → nginx:5443 → sub_proxy.py:9080 → 3x-ui:2096
#   sub_proxy.py декодирует base64, заменяет адреса/порты, кодирует обратно
# =============================================================================

    # ─── 3x-ui подписка (через sub-proxy) ─────────────────────────────────
    location /xui-sub/ {
        # Подписка — только GET/HEAD
        limit_except GET HEAD {
            deny all;
        }

        limit_req zone=one burst=10 nodelay;

        # Проксируем на локальный sub_proxy.py
        proxy_pass http://127.0.0.1:9080;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;

        # Буферизация (подписки обычно < 100KB)
        proxy_buffering     on;
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;

        # ── Заголовки безопасности ──
        # Подписка содержит VPN-credentials — запретить кеширование и индексацию
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }
