# /etc/nginx/conf.d/vpn-proxy.conf
#
# Назначение: HTTPS-прокси на RU для доступа к GE-ресурсам без VPN
# ─────────────────────────────────────────────────────────────────────────────

# ── Map: корректная обработка WebSocket Upgrade ──────────────────────────────
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ""        close;
}

# ── Лог-формат: без query string (токены авторизации в URL не логируются) ─────
log_format proxy_safe '$remote_addr - [$time_local] '
                      '"$request_method $uri $server_protocol" '
                      '$status $body_bytes_sent '
                      'rt=$request_time urt="$upstream_response_time" '
                      'ssl="$ssl_protocol/$ssl_cipher"';

# ─── Catch-all: блокировать запросы к неизвестным именам хостов ───────────────
# Защита от сканеров которые коннектятся напрямую по IP.
server {
    listen 5443 ssl default_server;
    ssl_certificate     /etc/letsencrypt/live/11-11-11-11.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/11-11-11-11.sslip.io/privkey.pem;
    server_name         _;
    access_log          off;
    return 444;
}

# ─── Основной сервер ──────────────────────────────────────────────────────────
server {
    listen 5443 ssl;

    server_name 11-11-11-11.sslip.io;

    # ── TLS: сертификат RU ──
    ssl_certificate     /etc/letsencrypt/live/11-11-11-11.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/11-11-11-11.sslip.io/privkey.pem;
    # ssl_protocols, ssl_ciphers, ssl_session_*, ssl_stapling — наследуются из nginx.conf

    # ── Логи (без query string — не логируем токены подписок) ──
    access_log /var/log/nginx/vpn-proxy-access.log proxy_safe;
    error_log  /var/log/nginx/vpn-proxy-error.log warn;

    # ── Таймауты к upstream ──
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;
    proxy_read_timeout      60s;

    # ── TLS к upstream GE ──
    proxy_ssl_protocols               TLSv1.2 TLSv1.3;
    proxy_ssl_server_name             on;
    proxy_ssl_name                    22-22-22-22.sslip.io;
    proxy_ssl_verify                  on;
    proxy_ssl_trusted_certificate     /etc/ssl/certs/ca-certificates.crt;
    proxy_ssl_session_reuse           on;

    # ── Заголовки к upstream ──
    proxy_set_header Host              22-22-22-22.sslip.io;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    # Зачищаем заголовки которые клиент не должен подделывать
    proxy_set_header X-Forwarded-Host  "";
    proxy_set_header X-Accel-Redirect  "";

    # ── Скрыть внутренние заголовки upstream от клиента ──
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-Runtime;
    proxy_hide_header X-Generator;
    proxy_hide_header Server;

    # ── Перехватывать ошибки upstream (не показывать клиенту внутреннюю архитектуру) ──
    proxy_intercept_errors on;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type text/plain;
        return 503 "Service unavailable\n";
    }

    # =========================================================================
    # Subscription Relay — location-блоки для 3x-ui подписок
    # =========================================================================
    # Цепочка:
    #   Клиент → nginx:5443/<prefix>/<token> → sub_proxy.py:9080 → 3x-ui
    # =========================================================================

    # ─── 3x-ui подписка: сервер NL (основной) ─────────────────────────────
    location /xui-sub/ {
        limit_except GET HEAD { deny all; }
        include conf.d/sub-proxy-common.inc;
    }

    # ─── 3x-ui подписка: сервер DE (xray, query string формат) ──────────
    location /xui-sub-de/ {
        limit_except GET HEAD { deny all; }
        include conf.d/sub-proxy-common.inc;
    }

    # ─── Обработчики ошибок для подписок (named locations) ────────────────
    # Python BaseHTTPRequestHandler.send_error() генерирует HTML с деталями
    # (путь, метод, код) — не показываем клиенту. Возвращаем generic text.
    location @sub_err_not_found {
        internal;
        default_type text/plain;
        return 404 "Not Found\n";
    }

    location @sub_err_bad_gw {
        internal;
        default_type text/plain;
        return 502 "Bad Gateway\n";
    }

    # ─── Catch-all: все остальные пути ─────────────────────────────────────
    location / {
        return 444;
    }

}
