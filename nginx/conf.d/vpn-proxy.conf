client# /etc/nginx/conf.d/vpn-proxy.conf
#
# Назначение: HTTPS-прокси на RU для доступа к GE-ресурсам без VPN
# ─────────────────────────────────────────────────────────────────────────────

# ── Map: корректная обработка WebSocket Upgrade ──────────────────────────────
# Если клиент прислал Upgrade → передаём upstream; если нет → закрываем conn.
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ""        close;
}

# ── Лог-формат: без query string (токены авторизации в URL не логируются) ─────
log_format proxy_safe '$remote_addr - [$time_local] '
                      '"$request_method $uri $server_protocol" '
                      '$status $body_bytes_sent '
                      'rt=$request_time urt="$upstream_response_time" '
                      'ssl="$ssl_protocol/$ssl_cipher"';

# ─── Catch-all: блокировать запросы к неизвестным именам хостов ───────────────
# Защита от сканеров которые коннектятся напрямую по IP.
server {
    listen 5443 ssl default_server;
    ssl_certificate     /etc/letsencrypt/live/11-11-11-11.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/11-11-11-11.sslip.io/privkey.pem;
    server_name         _;
    return 444;          # Закрыть соединение без ответа
}

# ─── Основной сервер ──────────────────────────────────────────────────────────
server {
    listen 5443 ssl;

    server_name 11-11-11-11.sslip.io;

    # ── TLS: сертификат RU ──
    ssl_certificate     /etc/letsencrypt/live/11-11-11-11.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/11-11-11-11.sslip.io/privkey.pem;
    # ssl_protocols, ssl_ciphers, ssl_session_* — наследуются из nginx.conf

    # ── Логи (без query string) ──
    access_log /var/log/nginx/vpn-proxy-access.log proxy_safe;
    error_log  /var/log/nginx/vpn-proxy-error.log warn;

    # ── Таймауты ──
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;
    proxy_read_timeout      60s;

    # ── TLS к upstream GE ──
    proxy_ssl_protocols               TLSv1.2 TLSv1.3;
    proxy_ssl_server_name             on;
    proxy_ssl_name                    150-241-90-145.sslip.io;
    proxy_ssl_verify                  on;
    proxy_ssl_trusted_certificate     /etc/ssl/certs/ca-certificates.crt;
    proxy_ssl_session_reuse           on;

    server_tokens off;                            # скрыть версию nginx
    large_client_header_buffers 4 8k;             # ограничить размер URI/заголовков
    ssl_prefer_server_ciphers on;                 # серверный порядок шифров
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # ── Заголовки к upstream ──
    proxy_set_header Host              150-241-90-145.sslip.io;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    # Зачищаем заголовки которые клиент не должен подделывать
    proxy_set_header X-Forwarded-Host  "";
    proxy_set_header X-Accel-Redirect  "";

    # ── Скрыть внутренние заголовки upstream от клиента ──
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-Runtime;
    proxy_hide_header X-Generator;
    proxy_hide_header Server;

    # ── Перехватывать ошибки upstream (не показывать клиенту внутреннюю архитектуру) ──
    proxy_intercept_errors on;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { return 503 "Service unavailable"; }

# =============================================================================
# Subscription Relay — location-блоки для 3x-ui подписок
# =============================================================================
# Добавить эти блоки в существующий server { listen 5443 ssl; ... }
#
# Мульти-сервер: каждый 3x-ui сервер имеет свой location (path prefix).
# Все location проксируются на один sub_proxy.py, который роутит по пути.
#
# Цепочка:
#   Клиент → nginx:5443/<prefix>/<token> → sub_proxy.py:9080 → 3x-ui/<sub_path>/<token>
#   Клиент → nginx:5443/<prefix>/?id=UUID → sub_proxy.py:9080 → 3x-ui/<sub_path>/sub?id=UUID
#
# ВАЖНО: старый location / { proxy_pass + sub_filter } больше не нужен.
# Вместо него — catch-all location / { return 444; } в конце server-блока.
#
# ─── Рекомендации для server { } блока ──────────────────────────────────────
# Убедитесь, что в основном server-блоке (где listen 5443 ssl) есть:
#
#   server_tokens off;                            # скрыть версию nginx
#   large_client_header_buffers 4 8k;             # ограничить размер URI/заголовков
#   ssl_protocols TLSv1.2 TLSv1.3;               # без устаревших TLS 1.0/1.1
#   ssl_prefer_server_ciphers on;                 # серверный порядок шифров
#   ssl_session_timeout 1d;
#   ssl_session_cache shared:SSL:10m;
#
# =============================================================================

    # ─── 3x-ui подписка: сервер NL (основной) ─────────────────────────────
    # Пример: GET https://relay:5443/xui-sub/<token>
    location /xui-sub/ {
        limit_except GET HEAD { deny all; }
        include conf.d/sub-proxy-common.conf;
    }

    # ─── 3x-ui подписка: сервер DE (xray, query string формат) ──────────
    # Пример: GET https://relay:5443/xui-sub-de/?t=si&r=si&s=<UUID>
    # Query string пробрасывается к sub_proxy.py → upstream
    location /xui-sub-de/ {
        limit_except GET HEAD { deny all; }
        include conf.d/sub-proxy-common.conf;
    }

    # ─── Обработчики ошибок для proxy_intercept_errors ──────────────────
    # Generic ответы вместо verbose ошибок от backend.
    location = /sub_error_404 {
        internal;
        default_type text/plain;
        return 404 "Not Found\n";
    }

    location = /sub_error_502 {
        internal;
        default_type text/plain;
        return 502 "Bad Gateway\n";
    }


    # ─── Catch-all: все остальные пути ─────────────────────────────────────
    # Заменяет старый location / { proxy_pass + sub_filter + cdn= }.
    # Подписки теперь обрабатываются через /xui-sub/ и /xui-sub-de/ → sub_proxy.py.
    # Любые неизвестные пути — молча закрываем соединение (защита от сканеров).
    location / {
        return 444;
    }

}
