user                              www-data;
pid                               /run/nginx.pid;
worker_processes                  auto;
worker_rlimit_nofile              65535;
error_log                         /var/log/nginx/error.log;
include                           /etc/nginx/modules-enabled/*.conf;

events {
    multi_accept                  on;
    worker_connections            65535;
}

http {
    # Security-related maps
    map $request_uri $cleaned_request_uri {
        default $request_uri;
        "~^(.*?)(\?x_padding=[^ ]*)\$" $1;
    }

    # Block common SQL injection and XSS patterns
    map $request_uri $block_sql_injections {
        default 0;
        "~*union.*select.*" 1;
        "~*concat.*\(" 1;
    }

    map $http_user_agent $block_bots {
        default 0;
        "~*curl" 1;
        "~*wget" 1;
        "~*scanning" 1;
        "~*bot" 0;  # Разрешаем легитимных ботов
        "~*spider" 0;  # Разрешаем легитимных пауков
    }

    # Enhanced Logging
#    log_format json_analytics escape=json '{'
#        '"timestamp": "$time_iso8601", '
#        '"client_ip": "$http_x_forwarded_for", '
#        '"proxy_ip": "$proxy_protocol_addr", '
#        '"method": "$request_method", '
#        '"status": "$status", '
#        '"user_agent": "$http_user_agent", '
#        '"uri": "$cleaned_request_uri", '
#        '"referer": "$http_referer", '
#        '"request_time": "$request_time", '
#        '"body_bytes_sent": "$body_bytes_sent", '
#        '"http_host": "$host", '
#        '"server_protocol": "$server_protocol"'
#    '}';

    # Basic Settings
    sendfile                      on;
    tcp_nopush                    on;
    tcp_nodelay                   on;
    server_tokens                 off;
    log_not_found                 off;
    types_hash_max_size           2048;
    types_hash_bucket_size        64;
    client_max_body_size          16M;
    client_body_buffer_size       16k;

    # Timeouts
    client_body_timeout           10s;
    client_header_timeout         10s;
    keepalive_timeout            60s;
    keepalive_requests           1000;
    reset_timedout_connection     on;
    send_timeout                 10s;

    # Buffer Size
    client_header_buffer_size     1k;
    large_client_header_buffers   4 8k;
    
    # File Cache
    open_file_cache              max=1000 inactive=20s;
    open_file_cache_valid        30s;
    open_file_cache_min_uses     2;
    open_file_cache_errors       on;

    # Proxy Buffer
    proxy_buffer_size            4k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size      16k;

    # MIME
    include                       /etc/nginx/mime.types;
    default_type                  application/octet-stream;

    # SSL
    ssl_session_timeout          1d;
    ssl_session_cache            shared:SSL:10m;
    ssl_session_tickets          off;
    ssl_prefer_server_ciphers    on;
    ssl_protocols                TLSv1.2 TLSv1.3;
    ssl_ciphers                  TLS13-AES-128-GCM-SHA256:TLS13-AES-256-GCM-SHA384:TLS13-CHACHA20-POLY1305-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    
    # OCSP Stapling
#    ssl_stapling                 on;
#    ssl_stapling_verify          on;
    resolver                     1.1.1.1 8.8.8.8 valid=60s ipv6=off;
    resolver_timeout             2s;

    # Security Headers
#    add_header X-Frame-Options           "SAMEORIGIN" always;
#    add_header X-Content-Type-Options    "nosniff" always;
#    add_header X-XSS-Protection         "1; mode=block" always;
#    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
#    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#    add_header Content-Security-Policy   "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
#    add_header Permissions-Policy        "interest-cohort=()" always;
#    proxy_hide_header                    X-Powered-By;

    # Security Headers
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
    add_header X-Robots-Tag "noindex, nofollow";
    proxy_hide_header                    X-Powered-By;
    proxy_hide_header                    X-AspNet-Version;
    proxy_hide_header                    X-Runtime;

    log_format  detailed  '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  detailed;
#    access_log /var/log/nginx/access.log;

    # Gzip Settings
    gzip                         on;
    gzip_vary                    on;
    gzip_proxied                 any;
    gzip_comp_level              6;
    gzip_types                   text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length             1000;

    # Rate Limiting
    limit_req_zone              $binary_remote_addr zone=one:10m rate=1r/s;
    limit_conn_zone             $binary_remote_addr zone=addr:10m;

    # FastCGI Cache
    fastcgi_cache_path          /tmp/nginx_cache levels=1:2 keys_zone=my_cache:10m max_size=10g inactive=60m use_temp_path=off;
    fastcgi_cache_key           "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale     error timeout invalid_header http_500;
    fastcgi_cache_valid         200 60m;
    
    # Include configurations
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
