user                              www-data;
pid                               /run/nginx.pid;
worker_processes                  auto;
worker_rlimit_nofile              65535;
error_log                         /var/log/nginx/error.log;
include                           /etc/nginx/modules-enabled/*.conf;

events {
    multi_accept                  on;
    worker_connections            65535;
}

http {
    # ── Удаление x_padding из URI для логов ──
    map $request_uri $cleaned_request_uri {
        default $request_uri;
        "~^(.*?)(\?x_padding=[^ ]*)\$" $1;
    }

    # ── Basic Settings ──
    sendfile                      on;
    tcp_nopush                    on;
    tcp_nodelay                   on;
    server_tokens                 off;
    log_not_found                 off;
    types_hash_max_size           2048;
    types_hash_bucket_size        64;
    client_max_body_size          16M;
    client_body_buffer_size       16k;

    # ── Timeouts ──
    client_body_timeout           10s;
    client_header_timeout         10s;
    keepalive_timeout            60s;
    keepalive_requests           1000;
    reset_timedout_connection     on;
    send_timeout                 10s;

    # ── Buffer Size ──
    client_header_buffer_size     1k;
    large_client_header_buffers   4 8k;

    # ── File Cache ──
    open_file_cache              max=1000 inactive=20s;
    open_file_cache_valid        30s;
    open_file_cache_min_uses     2;
    open_file_cache_errors       on;

    # ── Proxy Buffer ──
    proxy_buffer_size            4k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size      16k;

    # ── MIME ──
    include                       /etc/nginx/mime.types;
    default_type                  application/octet-stream;

    # ── SSL / TLS ──
    ssl_session_timeout          1d;
    ssl_session_cache            shared:SSL:10m;
    ssl_session_tickets          off;
    ssl_prefer_server_ciphers    on;
    ssl_protocols                TLSv1.2 TLSv1.3;
    # TLS 1.3 ciphers управляются OpenSSL автоматически (не через ssl_ciphers).
    # Ниже — только TLS 1.2 ciphers; ECDSA + RSA для совместимости с RSA-сертификатами.
    ssl_ciphers                  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!aECDH:!EDH-DSS-DES-CBC3-SHA:!KRB5-DES-CBC3-SHA;

    # ── OCSP Stapling ──
    ssl_stapling                 on;
    ssl_stapling_verify          on;
    resolver                     1.1.1.1 8.8.8.8 valid=60s ipv6=off;
    resolver_timeout             2s;

    # ── Security Headers (http-level defaults) ──
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Robots-Tag              "noindex, nofollow" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
    proxy_hide_header                    X-Powered-By;
    proxy_hide_header                    X-AspNet-Version;
    proxy_hide_header                    X-Runtime;

    # ── Logging ──
    log_format  detailed  '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  detailed;

    # ── Gzip ──
    gzip                         on;
    gzip_vary                    on;
    gzip_proxied                 any;
    gzip_comp_level              6;
    gzip_types                   text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length             1000;

    # ── Rate Limiting ──
    limit_req_zone              $binary_remote_addr zone=one:10m rate=1r/s;
    limit_conn_zone             $binary_remote_addr zone=addr:10m;

    # ── FastCGI Cache ──
    fastcgi_cache_path          /tmp/nginx_cache levels=1:2 keys_zone=my_cache:10m max_size=10g inactive=60m use_temp_path=off;
    fastcgi_cache_key           "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale     error timeout invalid_header http_500;
    fastcgi_cache_valid         200 60m;

    # ── Include configurations ──
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
