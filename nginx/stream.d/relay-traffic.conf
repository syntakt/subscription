# =============================================================================
# VPN Traffic Relay — Nginx Stream (L4)
# =============================================================================
# Пробрасывает VPN-трафик (VLESS/VMess/Trojan и т.д.) от клиента через relay
# на 3x-ui сервер. Клиент подключается к relay, relay прозрачно передаёт
# трафик на 3x-ui.
# =============================================================================
# Этот файл подключается в секцию stream {} файла nginx.conf
# Переменные ${...} подставляются setup.sh через envsubst.
# =============================================================================

# ── VLESS / Trojan (TLS, порт 443) ───────────────────────────────────────────
# Если 3x-ui слушает на 443 для inbound:
server {
    listen ${RELAY_VLESS_PORT};
    proxy_pass ${XUI_HOST}:${XUI_VLESS_PORT};
    proxy_connect_timeout 5s;
    proxy_timeout 300s;
}

# ── VMess / другие inbound (пример для произвольного порта) ───────────────────
# Раскомментируйте и добавьте столько блоков, сколько inbound-ов на 3x-ui:
#
# server {
#     listen ${RELAY_VMESS_PORT};
#     proxy_pass ${XUI_HOST}:${XUI_VMESS_PORT};
#     proxy_connect_timeout 5s;
#     proxy_timeout 300s;
# }
